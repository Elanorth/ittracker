name: CI — test

# NOT: `push` tetikleyicisi BİLİNÇLİ olarak YOK. develop/main push'larında testler
# zaten Deploy workflow'ları içinde koşar (jobs.test: uses ci.yml, workflow_call).
# Eskiden push tetikleyicisi de vardı → aynı push'ta İKİ CI run'ı aynı concurrency
# grubuna (ci-<ref>) düşüyor, cancel-in-progress biri diğerini İPTAL ediyordu →
# "test (push)" her seferinde cancelled (❌) görünüyor, elle re-run geçiyordu.
on:
  pull_request:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: System deps (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-xlib-2.0-0 libffi-dev

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pre-commit

      - name: Pre-commit hooks (ruff lint+format + secrets + temel kontroller)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Pytest
        env:
          ADMIN_PASSWORD: ci-test-password
          SECRET_KEY: ci-test-secret
        run: pytest -q --tb=short
