name: Deploy — staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.ittracker.inventist.com.tr
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          STAGING_DIR: ${{ secrets.STAGING_DIR }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" bash <<'EOF'
          set -euo pipefail
          cd "${STAGING_DIR:-/home/leventcan/ittracker-staging}"

          git fetch origin develop
          git checkout develop
          git pull --ff-only origin develop

          docker compose -p ittracker-staging -f docker-compose.staging.yml up -d --build
          docker compose -p ittracker-staging -f docker-compose.staging.yml ps
          EOF

      - name: Smoke test
        run: |
          sleep 8
          for i in 1 2 3 4 5; do
            CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://staging.ittracker.inventist.com.tr/login || echo 000)
            echo "attempt $i: HTTP $CODE"
            [[ "$CODE" == "200" ]] && exit 0
            sleep 5
          done
          echo "Smoke test FAILED"
          exit 1
