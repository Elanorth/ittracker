name: Deploy — production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata + tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/elanorth/ittracker
          tags: |
            type=raw,value=main
            type=raw,value=main-${{ github.sha }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: [self-hosted, ittracker]
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://ittracker.inventist.com.tr
    steps:
      - name: Login to GHCR (self-hosted runner)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: DB yedek + pull image + deploy
        env:
          PROD_DIR: ${{ secrets.PROD_DIR }}
        run: |
          cd "${PROD_DIR:-/home/leventcan/ittracker}"
          BEFORE=$(git rev-parse HEAD)

          # DB yedek
          if sudo -n test -f instance/it_tracker.db 2>/dev/null; then
            STAMP=$(date +%Y%m%d_%H%M%S)
            sudo -n cp instance/it_tracker.db instance/it_tracker_backup_${STAMP}.db
            sudo -n chown leventcan:leventcan instance/it_tracker_backup_${STAMP}.db
            echo "Backup: instance/it_tracker_backup_${STAMP}.db"
          else
            echo "DB yedek atlandi (sudo password required)"
          fi

          # docker-compose.yml ve nginx config gibi yönetim dosyalarını güncel tut
          git fetch origin main
          git reset --hard origin/main
          git clean -fd -e certbot
          AFTER=$(git rev-parse HEAD)
          echo "Deploying: $BEFORE -> $AFTER"

          # GHCR'dan yeni image'i çek + container'ı yeniden başlat (build yok)
          docker compose pull
          docker compose up -d
          docker compose ps

      - name: DB migration (Alembic)
        env:
          PROD_DIR: ${{ secrets.PROD_DIR }}
        run: |
          cd "${PROD_DIR:-/home/leventcan/ittracker}"
          # Container'ın healthcheck'i geçene kadar bekle (max 30s)
          for i in 1 2 3 4 5 6; do
            if docker compose exec -T web python -c "import sys; sys.exit(0)" 2>/dev/null; then
              break
            fi
            sleep 5
          done
          # Alembic upgrade (ilk seferde baseline'ı stamp'ler — boş upgrade)
          docker compose exec -T web flask db upgrade

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://ittracker.inventist.com.tr/login || echo 000)
            echo "attempt $i: HTTP $CODE"
            [ "$CODE" = "200" ] && exit 0
            sleep 5
          done
          echo "Smoke test FAILED"
          exit 1
