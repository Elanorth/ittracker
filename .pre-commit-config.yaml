# Pre-commit hooks — kod kalitesi ve gizli bilgi kontrolü
# Kurulum (geliştirici makinesi): pip install pre-commit && pre-commit install
# CI'da da çalışır (.github/workflows/ci.yml içinde "pre-commit run --all-files")

repos:
  # ────── Temel kontroller ──────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$  # markdown'da iki boşluklu satır sonu anlamlı (line break)
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-yaml
        # Jinja template'leri çakışmasın diye Flask templates dışında
        exclude: ^templates/
      - id: check-json
      - id: check-toml
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ────── Ruff: Python lint + format ──────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ────── Gizli bilgi tarama ──────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(\.secrets\.baseline|tests/|docs/)
