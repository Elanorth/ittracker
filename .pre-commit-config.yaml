# Pre-commit hooks — kod kalitesi ve gizli bilgi kontrolü
# Kurulum (geliştirici makinesi): pip install pre-commit && pre-commit install
# CI'da da çalışır (.github/workflows/ci.yml içinde "pre-commit run --all-files")

repos:
  # ────── Temel kontroller ──────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$  # markdown'da iki boşluklu satır sonu anlamlı (line break)
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-yaml
        # Jinja template'leri çakışmasın diye Flask templates dışında
        exclude: ^templates/
      - id: check-json
      - id: check-toml
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ────── Ruff: Python lint + format ──────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ────── ESLint: JS no-undef (ReferenceError sınıfını yakalar) ──────
  # v5.7'de taskRow içinde tanımsız `slaRem` kullanımı prod'da dashboard'u
  # boşaltmıştı (ReferenceError). node --check yalnızca syntax bakar, bunu
  # kaçırır. ESLint no-undef tanımsız değişken kullanımını deploy ÖNCESİ yakalar.
  # CI zaten `pre-commit run --all-files` çalıştırdığı için ekstra ci.yml adımı gerekmez.
  #
  # NOT: mirrors-eslint yerine `local` + `language: node` kullanılıyor —
  # mirrors-eslint yalnızca v9/v10 tag'i sunuyor (flat config zorunlu, .eslintrc.json
  # okunmuyor). eslint@8 legacy .eslintrc.json + built-in `env`'i destekler ve
  # pre-commit node'u kendi izole ortamına otomatik kurar (geliştiricide node şart değil).
  - repo: local
    hooks:
      - id: eslint
        name: eslint (no-undef)
        entry: eslint
        language: node
        additional_dependencies: ["eslint@8.57.1"]
        files: ^static/.*\.js$

  # ────── Gizli bilgi tarama ──────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(\.secrets\.baseline|tests/|docs/)
