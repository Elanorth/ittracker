# Flask-Migrate ile yönetilen Alembic config.
# Çağrı: flask db <komut> (alembic doğrudan çağrılmaz)
#
# Komut örnekleri:
#   flask db migrate -m "açıklama"   → autogenerate revision
#   flask db upgrade                 → en son revision'a yükselt
#   flask db downgrade -1            → bir revision geri al
#   flask db history                 → revision listesi
#   flask db current                 → şu anda hangi revision'dayız
#   flask db stamp head              → mevcut DB'yi en son rev olarak işaretle

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = driver://user:pass@localhost/dbname  # env.py'den override edilir

[loggers]
keys = root,sqlalchemy,alembic,flask_migrate

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
