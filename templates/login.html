<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT//TRACKER · Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--surface:#0f1419;--surface2:#161d26;--border:#242d38;--border2:#2e3a47;--accent:#00e5c0;--accent3:#7f6cf7;--text:#dce6f0;--text-muted:#6b7e93;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:48px 40px;width:420px;text-align:center;position:relative;z-index:1;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:20px;color:var(--accent);letter-spacing:3px;margin-bottom:6px;}
.sub{font-size:11px;color:var(--text-muted);margin-bottom:40px;letter-spacing:.3px;}
.title{font-size:22px;font-weight:700;margin-bottom:8px;}
.desc{font-size:13px;color:var(--text-muted);margin-bottom:32px;}
.o365-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:16px 20px;font-size:15px;font-weight:600;cursor:pointer;color:var(--text);font-family:'Syne',sans-serif;margin-bottom:8px;text-decoration:none;transition:.15s;}
.o365-btn:hover{border-color:var(--accent3);color:var(--accent3);background:#1a2030;}
.o365-hint{font-size:11px;color:var(--text-muted);margin-bottom:28px;}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0 20px;color:var(--text-muted);font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
input{display:block;width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:11px 14px;font-size:13px;font-family:'Syne',sans-serif;outline:none;margin-bottom:10px;transition:.12s;}
input:focus{border-color:var(--accent);}
.btn{width:100%;background:var(--accent);color:#080c10;border:none;border-radius:7px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:.15s;margin-top:4px;}
.btn:hover{background:#00cfad;}
.error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:7px;padding:10px 14px;font-size:12px;color:#f85149;margin-bottom:14px;text-align:left;}
.admin-label{font-size:10px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">IT//TRACKER</div>
  <div class="sub" id="login-sub">İnventist &amp; Assos · IT Yönetim Sistemi</div>
  <div class="title">Hoş Geldiniz</div>
  <div class="desc">Şirket hesabınızla devam edin</div>

  <a href="/auth/o365" class="o365-btn">
    <svg width="20" height="20" viewBox="0 0 21 21">
      <rect x="1"  y="1"  width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1"  width="9" height="9" fill="#7fba00"/>
      <rect x="1"  y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    Microsoft 365 ile Giriş Yap
  </a>
  <div class="o365-hint">@inventist.com.tr veya @assos.com.tr <a href="/login?admin=1" style="color:inherit;text-decoration:none;cursor:text">hesabınızla</a></div>

  {% if admin_mode %}
  <div class="divider">YÖNETİCİ GİRİŞİ</div>
  <div class="admin-label">Yalnızca sistem yöneticisi için</div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <input name="username" placeholder="Kullanıcı adı" required autocomplete="username">
    <input name="password" type="password" placeholder="Şifre" required autocomplete="current-password">
    <button type="submit" class="btn">Giriş Yap</button>
  </form>
  {% endif %}
</div>
</body>
</html>
