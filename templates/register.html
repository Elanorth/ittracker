<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>IT//TRACKER · Kayıt</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--surface:#0f1419;--surface2:#161d26;--border2:#2e3a47;--accent:#00e5c0;--gold:#f4b942;--text:#dce6f0;--text-muted:#6b7e93;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:44px 40px;width:440px;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--accent);letter-spacing:2px;margin-bottom:20px;text-align:center;}
h1{font-size:20px;font-weight:700;margin-bottom:6px;}
.sub{font-size:12px;color:var(--text-muted);margin-bottom:24px;}
.info-box{background:rgba(0,229,192,.07);border:1px solid rgba(0,229,192,.2);border-radius:8px;padding:12px 16px;margin-bottom:22px;font-size:12px;}
.info-box .lbl{color:var(--text-muted);font-size:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;}
label{display:block;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-family:'IBM Plex Mono',monospace;margin-bottom:5px;margin-top:12px;}
input{display:block;width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:11px 14px;font-size:13px;font-family:'Syne',sans-serif;outline:none;transition:.12s;}
input:focus{border-color:var(--accent);}
.btn{width:100%;background:var(--accent);color:#080c10;border:none;border-radius:7px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;margin-top:20px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">IT//TRACKER</div>
  <h1>Hesap Oluştur</h1>
  <div class="sub">Davete hoş geldiniz! Aşağıdaki bilgileri doldurun.</div>

  <div class="info-box">
    <div class="lbl">Davet Bilgileri</div>
    <strong>{{ invitation.full_name }}</strong> · {{ invitation.email }}<br>
    <span style="color:var(--gold)">{{ invitation.role }}</span>
  </div>

  <form method="POST">
    <input type="hidden" name="token" value="{{ request.args.get('token') }}">
    <label>Kullanıcı Adı</label>
    <input name="username" placeholder="ornekkullanici" required>
    <label>Şifre</label>
    <input name="password" type="password" placeholder="En az 8 karakter" required>
    <label>Şifre Tekrar</label>
    <input name="password2" type="password" placeholder="Şifrenizi tekrar girin" required>
    <button type="submit" class="btn">Hesabı Oluştur</button>
  </form>
</div>
</body>
</html>
