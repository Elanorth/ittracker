<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>IT//TRACKER · Davet</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--surface:#0f1419;--surface2:#161d26;--border:#242d38;--border2:#2e3a47;--accent:#00e5c0;--accent3:#7f6cf7;--gold:#f4b942;--text:#dce6f0;--text-muted:#6b7e93;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:44px 40px;width:440px;text-align:center;position:relative;z-index:1;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--accent);letter-spacing:2px;margin-bottom:28px;}
h1{font-size:20px;font-weight:700;margin-bottom:6px;}
.sub{font-size:12px;color:var(--text-muted);margin-bottom:28px;}
.info-box{background:rgba(0,229,192,.07);border:1px solid rgba(0,229,192,.2);border-radius:10px;padding:16px 20px;margin-bottom:28px;text-align:left;}
.info-lbl{color:var(--text-muted);font-size:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.info-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.info-email{font-size:12px;color:var(--text-muted);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;}
.info-role{display:inline-flex;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(244,185,66,.12);color:var(--gold);border:1px solid rgba(244,185,66,.2);}
.o365-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:16px 20px;font-size:15px;font-weight:600;cursor:pointer;color:var(--text);font-family:'Syne',sans-serif;text-decoration:none;transition:.15s;margin-bottom:10px;}
.o365-btn:hover{border-color:var(--accent3);color:var(--accent3);background:#1a2030;}
.hint{font-size:11px;color:var(--text-muted);line-height:1.6;}
.hint strong{color:var(--accent);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">IT//TRACKER</div>
  <h1>Davetiniz Var</h1>
  <div class="sub">Hesabınızı aktifleştirmek için Microsoft 365 ile giriş yapın</div>

  <div class="info-box">
    <div class="info-lbl">Davet Bilgileri</div>
    <div class="info-name">{{ invitation.full_name }}</div>
    <div class="info-email">{{ invitation.email }}</div>
    <span class="info-role">{{ invitation.role }}</span>
  </div>

  <a href="/auth/o365?invite={{ token }}" class="o365-btn">
    <svg width="20" height="20" viewBox="0 0 21 21">
      <rect x="1"  y="1"  width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1"  width="9" height="9" fill="#7fba00"/>
      <rect x="1"  y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    Microsoft 365 ile Devam Et
  </a>

  <div class="hint">
    <strong>{{ invitation.email }}</strong> adresinin bağlı olduğu<br>
    Microsoft hesabıyla giriş yapmanız gerekmektedir.
  </div>
</div>
</body>
</html>
