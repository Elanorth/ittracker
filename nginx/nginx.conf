# HTTP → HTTPS yönlendirme + Let's Encrypt doğrulama
server {
    listen 80;
    server_name ittracker.assospharma.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ittracker.assospharma.com$request_uri;
    }
}

# HTTPS — Ana sunucu
server {
    listen 443 ssl;
    server_name ittracker.assospharma.com;

    ssl_certificate     /etc/letsencrypt/live/ittracker.assospharma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ittracker.assospharma.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 55M;

    location / {
        proxy_pass         http://web:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
